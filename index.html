function saveBackup() {
  let all = JSON.parse(JSON.stringify(savedEntries));
  const loc = document.getElementById('siteName').value.trim();
  const prot = document.getElementById('protocolArea').value.trim();
  const tgc  = document.getElementById('teamGuideCitation').value.trim();
  const det = document.getElementById('entryDetails').value.trim();
  if (loc || det) {
    all.push({
      id: currentEntryId,
      siteName: loc,
      location: loc, protocolArea: prot, teamGuideCitation: tgc, details: det,
      latitude:  currentGPS ? currentGPS.latitude  : null,
      longitude: currentGPS ? currentGPS.longitude : null,
      gpsAccuracy: currentGPS ? currentGPS.accuracy : null,
      timestamp: new Date().toISOString(),
      photos: {}
    });
  }
  if (all.length === 0) { showToast('Nothing to back up', true); return; }

  const clean = all.map(({ photos, ...rest }) => rest);
  const blob  = new Blob([JSON.stringify({ version:1, exported: new Date().toISOString(), entries: clean }, null, 2)], { type:'application/json' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href = url; a.download = `USFS_Backup_${datestamp()}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`Backup saved \u2014 ${clean.length} entries`);
}

function importBackup() {
  document.getElementById('backupFileInput').value = '';
  document.getElementById('backupFileInput').click();
}

function handleBackupFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed  = JSON.parse(e.target.result);
      let entries   = Array.isArray(parsed) ? parsed : (parsed.entries || null);
      if (!entries || !Array.isArray(entries)) throw new Error('Unrecognised format');
      entries       = entries.filter(en => en && (en.location || en.details));

      if (entries.length === 0) { showToast('No valid entries found', true); return; }

      const action = confirm(
        `Found ${entries.length} entries in backup.\n\n` +
        `OK = MERGE with existing ${savedEntries.length} entries\n` +
        `Cancel = REPLACE all current entries`
      );

      if (!action) {
        savedEntries = entries.map(normaliseEntry);
      } else {
        const existing = new Set(savedEntries.map(e => e.location + '|' + e.timestamp));
        let added = 0;
        entries.forEach(en => {
          const n  = normaliseEntry(en);
          const key = n.location + '|' + n.timestamp;
          if (!existing.has(key)) { savedEntries.push(n); existing.add(key); added++; }
        });
        showToast(`Merged: ${added} new, ${entries.length - added} skipped`);
      }

      try { localStorage.setItem(LS_SAVED, JSON.stringify(savedEntries)); } catch(e) {}
      renderSavedPanel();
      updateHeaderBadge();
      if (!action) showToast(`Loaded ${entries.length} entries`);
    } catch(err) {
      showToast('Import failed: ' + err.message, true);
    }
  };
  reader.readAsText(file);
}

function normaliseEntry(e) {
  return {
    id:        e.id        || genId(),
    siteName:  e.siteName  || e.location || '',
    location:  e.location  || e.siteName || '',
    protocolArea: e.protocolArea || '',
    teamGuideCitation: e.teamGuideCitation || '',
    details:   e.details   || '',
    latitude:  e.latitude  != null ? e.latitude  : null,
    longitude: e.longitude != null ? e.longitude : null,
    gpsAccuracy: e.gpsAccuracy != null ? e.gpsAccuracy : null,
    timestamp: e.timestamp || '',
    photos:    {}
  };
}

// ============================================================================
// GEOLOCATION
// ============================================================================
function captureGPS(silent) {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      if (!silent) showToast('Geolocation not available on this device', true);
      reject(new Error('no geolocation'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const acc = Math.round(pos.coords.accuracy);
        currentGPS = { latitude: lat, longitude: lon, accuracy: acc };
        updateGPSDisplay();
        autoSaveCurrent();
        resolve(currentGPS);
      },
      err => {
        if (!silent) {
          const msgs = {
            1: 'Location permission denied \u2014 check Settings > Privacy > Location',
            2: 'Location unavailable \u2014 try again outdoors or near a window',
            3: 'Location request timed out \u2014 try again'
          };
          const msg = msgs[err.code] || 'Location error';
          const status = document.getElementById('gpsStatus');
          status.textContent = msg;
          status.style.color = 'var(--danger)';
          status.style.display = 'block';
          showToast(msg, true);
        }
        reject(err);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

function updateGPSDisplay() {
  const display = document.getElementById('gpsDisplay');
  const status  = document.getElementById('gpsStatus');
  const clearBtn = document.getElementById('gpsClearBtn');
  if (currentGPS) {
    const lat = currentGPS.latitude.toFixed(6);
    const lonDir = currentGPS.longitude < 0 ? 'W' : 'E';
    display.value = `${lat}\u00B0N, ${Math.abs(currentGPS.longitude).toFixed(6)}\u00B0${lonDir}`;
    display.style.color = 'var(--text)';
    status.textContent = `\u00B1${currentGPS.accuracy}m accuracy`;
    status.style.color = currentGPS.accuracy <= 20 ? 'var(--success)' : currentGPS.accuracy <= 100 ? 'var(--warning)' : 'var(--danger)';
    status.style.display = 'block';
    clearBtn.style.display = 'block';
  } else {
    display.value = '';
    display.style.color = 'var(--text-dim)';
    status.style.display = 'none';
    clearBtn.style.display = 'none';
  }
}

function getGPS() {
  const btn   = document.getElementById('gpsBtn');
  const label = document.getElementById('gpsBtnLabel');
  const icon  = document.getElementById('gpsBtnIcon');

  btn.disabled = true;
  label.textContent = 'Locating\u2026';
  icon.innerHTML = '<circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle>';

  captureGPS(false)
    .then(gps => showToast(`GPS captured (\u00B1${gps.accuracy}m)`))
    .catch(() => {})
    .finally(() => {
      btn.disabled = false;
      label.textContent = 'GPS';
      icon.innerHTML = '<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z"/>';
    });
}

function clearGPS() {
  currentGPS = null;
  updateGPSDisplay();
  autoSaveCurrent();
}

// ============================================================================
// TEAM GUIDE CITATION SEARCH
// ============================================================================
let tgCitations = [];
let tgLoaded = false;

async function loadCitations() {
  if (tgLoaded) return;
  try {
    const resp = await fetch('./team_guide_citations.json');
    tgCitations = await resp.json();
    tgLoaded = true;
    console.log(`Loaded ${tgCitations.length} Team Guide citations`);
  } catch(e) {
    console.warn('Could not load citations:', e);
  }
}

// Load on startup
loadCitations();

let tgDebounce = null;
function filterCitations() {
  clearTimeout(tgDebounce);
  tgDebounce = setTimeout(_filterCitations, 150);
}

function _filterCitations() {
  const query = document.getElementById('tgSearch').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('tgResults');

  if (!query || query.length < 2) {
    resultsDiv.style.display = 'none';
    return;
  }

  if (!tgLoaded) {
    resultsDiv.innerHTML = '<div class="tg-no-results">Loading citations...</div>';
    resultsDiv.style.display = 'block';
    loadCitations().then(() => _filterCitations());
    return;
  }

  const terms = query.split(/\s+/).filter(Boolean);
  const scored = [];

  for (let i = 0; i < tgCitations.length; i++) {
    const item = tgCitations[i];
    const haystack = (item.c + ' ' + item.s + ' ' + item.d + ' ' + item.r).toLowerCase();
    let match = true;
    let score = 0;
    for (const term of terms) {
      if (!haystack.includes(term)) { match = false; break; }
      // Boost exact code matches
      if (item.c.toLowerCase().includes(term)) score += 10;
      // Boost citation matches
      if (item.r.toLowerCase().includes(term)) score += 5;
      score += 1;
    }
    if (match) scored.push({ idx: i, score });
  }

  scored.sort((a, b) => b.score - a.score);
  const top = scored.slice(0, 30);

  if (top.length === 0) {
    resultsDiv.innerHTML = '<div class="tg-no-results">No matching citations found</div>';
    resultsDiv.style.display = 'block';
    return;
  }

  resultsDiv.innerHTML = top.map(({ idx }) => {
    const item = tgCitations[idx];
    return `<div class="tg-item" tabindex="0" onclick="selectCitation(${idx})" onkeydown="if(event.key==='Enter')selectCitation(${idx})">
      <div><span class="tg-item-code">${esc(item.c)}</span><span class="tg-item-section">${esc(item.s)}</span></div>
      <div class="tg-item-desc">${esc(item.d)}</div>
      ${item.r ? `<div class="tg-item-cite">${esc(item.r)}</div>` : ''}
    </div>`;
  }).join('');
  resultsDiv.style.display = 'block';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function selectCitation(idx) {
  const item = tgCitations[idx];
  const citText = item.r ? `${item.c} — ${item.r}` : item.c;

  document.getElementById('teamGuideCitation').value = citText;
  document.getElementById('tgSearch').value = '';
  document.getElementById('tgResults').style.display = 'none';

  const sel = document.getElementById('tgSelected');
  sel.innerHTML = `<div style="font-weight:600;color:var(--accent);font-family:monospace;">${esc(item.c)}</div>
    <div style="color:var(--text);">${esc(item.d)}</div>
    ${item.r ? `<div style="color:var(--text-label);font-style:italic;margin-top:2px;">${esc(item.r)}</div>` : ''}
    <div style="color:var(--text-dim);margin-top:2px;">${esc(item.s)}</div>`;
  sel.style.display = 'block';
  document.getElementById('tgClearBtn').style.display = 'flex';

  autoSaveCurrent();
}

function clearCitation() {
  document.getElementById('teamGuideCitation').value = '';
  document.getElementById('tgSearch').value = '';
  document.getElementById('tgResults').style.display = 'none';
  document.getElementById('tgSelected').style.display = 'none';
  document.getElementById('tgClearBtn').style.display = 'none';
  autoSaveCurrent();
}

function restoreCitationDisplay() {
  const val = document.getElementById('teamGuideCitation').value;
  if (!val) {
    document.getElementById('tgSelected').style.display = 'none';
    document.getElementById('tgClearBtn').style.display = 'none';
    return;
  }
  // Try to find matching citation and show it
  const code = val.split(' — ')[0].trim();
  loadCitations().then(() => {
    const idx = tgCitations.findIndex(c => c.c === code);
    if (idx >= 0) {
      const item = tgCitations[idx];
      const sel = document.getElementById('tgSelected');
      sel.innerHTML = `<div style="font-weight:600;color:var(--accent);font-family:monospace;">${esc(item.c)}</div>
        <div style="color:var(--text);">${esc(item.d)}</div>
        ${item.r ? `<div style="color:var(--text-label);font-style:italic;margin-top:2px;">${esc(item.r)}</div>` : ''}
        <div style="color:var(--text-dim);margin-top:2px;">${esc(item.s)}</div>`;
      sel.style.display = 'block';
    } else {
      const sel = document.getElementById('tgSelected');
      sel.innerHTML = `<div style="font-weight:600;color:var(--accent);font-family:monospace;">${esc(val)}</div>`;
      sel.style.display = 'block';
    }
    document.getElementById('tgClearBtn').style.display = 'flex';
  });
}

// Close results when clicking outside
document.addEventListener('click', e => {
  const container = document.querySelector('.form-group:has(#tgSearch)');
  if (container && !container.contains(e.target)) {
    document.getElementById('tgResults').style.display = 'none';
  }
});

// ============================================================================
// PERSISTENCE
// ============================================================================
function autoSaveCurrent() {
  try {
    localStorage.setItem(LS_CURRENT, JSON.stringify({
      siteName:      document.getElementById('siteName').value,
      protocolArea:  document.getElementById('protocolArea').value,
      teamGuideCitation: document.getElementById('teamGuideCitation').value,
      entryDetails:  document.getElementById('entryDetails').value,
      currentPhotos, currentEntryId, extraPhotoSlots, currentGPS
    }));
    checkStorage();
  } catch(e) { showToast('Storage issue \u2014 export soon', true); }
}

function saveAll() {
  try { localStorage.setItem(LS_SAVED, JSON.stringify(savedEntries)); checkStorage(); }
  catch(e) { showToast('Storage error \u2014 export soon!', true); }
}

function loadAll() {
  try {
    const s = localStorage.getItem(LS_SAVED);
    if (s) savedEntries = JSON.parse(s);
  } catch(e) {}

  try {
    const c = localStorage.getItem(LS_CURRENT);
    if (!c) return;
    const state = JSON.parse(c);

    document.getElementById('siteName').value      = state.siteName      || '';
    document.getElementById('protocolArea').value  = state.protocolArea  || '';
    document.getElementById('teamGuideCitation').value = state.teamGuideCitation || '';
    restoreCitationDisplay();
    document.getElementById('entryDetails').value   = state.entryDetails  || '';

    currentPhotos  = state.currentPhotos  || {};
    currentEntryId = state.currentEntryId || genId();
    currentGPS     = state.currentGPS    || null;
    updateGPSDisplay();

    // Restore any extra photo slots
    extraPhotoSlots = [];
    const extraSlotsContainer = document.getElementById('extraSlotsContainer');
    if (extraSlotsContainer) extraSlotsContainer.innerHTML = '';
    const savedExtra = state.extraPhotoSlots || [];
    savedExtra.forEach(slotId => {
      extraPhotoSlots.push(slotId);
      const num = 2 + extraPhotoSlots.length;
      const wrapper = document.createElement('div');
      wrapper.className = 'photo-grid photo-slot-extra';
      wrapper.id = 'wrapper_' + slotId;
      wrapper.style.marginTop = '12px';
      const ph = currentPhotos[slotId] && currentPhotos[slotId].thumbnail;
      wrapper.innerHTML = `
        <div class="photo-slot" style="grid-column:1/span 1;">
          <label>Photo ${num}</label>
          <div class="photo-capture ${ph ? 'has-photo' : ''}" onclick="takePhoto('${slotId}')" id="photo_${slotId}">
            ${ph
              ? `<img src="${ph}"><span class="retake-badge">Retake</span><span class="saved-badge">\u2713</span>`
              : `<span class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M9 2h6l1 3H8l1-3z"/></svg>Tap to capture</span>`}
          </div>
          <input type="file" accept="image/*" capture="environment" id="file_${slotId}" onchange="handlePhoto(this,'${slotId}')">
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:4px;">
          <button class="btn btn-outline btn-sm" onclick="removePhotoSlot('${slotId}')"
            style="color:var(--danger);border-color:var(--danger);padding:6px 12px;">\u2715 Remove</button>
        </div>`;
      if (extraSlotsContainer) extraSlotsContainer.appendChild(wrapper);
    });

    const PH = `<span class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <circle cx="12" cy="12" r="3"/>
        <path d="M9 2h6l1 3H8l1-3z"/>
      </svg>Tap to capture</span>`;

    PHOTO_SLOTS.forEach(slot => {
      if (currentPhotos[slot] && currentPhotos[slot].thumbnail) {
        const el = document.getElementById('photo_' + slot);
        if (el) {
          el.classList.add('has-photo');
          el.innerHTML = `<img src="${currentPhotos[slot].thumbnail}"><span class="retake-badge">Retake</span><span class="saved-badge">\u2713</span>`;
        }
      }
    });
  } catch(e) {}
}

function checkStorage() {
  try {
    let bytes = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith('usfs_') || k.startsWith('photo_full_')))
        bytes += localStorage.getItem(k).length * 2;
    }
    const pct = Math.round(bytes / (5 * 1024 * 1024) * 100);
    const ind = document.getElementById('storageIndicator');
    const msg = document.getElementById('storageMsg');

    if (pct >= 85) {
      ind.style.display = 'block';
      if (pct >= 95) {
        msg.textContent  = '\u26A0 Entry cache full \u2014 export & restart to continue';
        ind.style.color  = '#d94a4a';
        showToast('\u26A0 Export now \u2014 entry cache is full. Your photos are safe.', true);
      } else {
        msg.textContent  = 'Export soon to free up entry cache';
        ind.style.color  = '#d9a84a';
      }
    } else {
      ind.style.display = 'none';
    }
  } catch(e) {}
}

// ============================================================================
// UTILITIES
// ============================================================================
function quote(val) {
  if (!val) return '';
  val = String(val);
  if (val.includes(',') || val.includes('"') || val.includes('\n'))
    return `"${val.replace(/"/g,'""')}"`;
  return val;
}

function datestamp() {
  const d = new Date();
  return `${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${String(d.getFullYear()).slice(2)}`;
}

function showToast(msg, isWarn = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isWarn ? ' toast-warn' : '');
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ============================================================================
// OVERFLOW MENU
// ============================================================================
function toggleOverflow() {
  document.getElementById('overflowDropdown').classList.toggle('open');
}

function closeOverflow() {
  document.getElementById('overflowDropdown').classList.remove('open');
}

document.addEventListener('click', e => {
  const wrapper = document.getElementById('overflowWrapper');
  if (wrapper && !wrapper.contains(e.target)) closeOverflow();
});

// ============================================================================
// START
// ============================================================================
init();
</script>
